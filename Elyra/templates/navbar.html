<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="h-16 md:h-20 bg-gray-700 top-0 z-50 w-full flex items-center px-4 sm:px-6 md:px-8 shadow-md gap-3">
        <div class="flex-shrink-0">
            <a href="/"><img class="h-10 w-10 md:h-14 md:w-14" src="/static/RGwLl.webp" alt="logo"></a>
        </div>

        <!-- Desktop links -->
        <div class="hidden md:flex flex-1 justify-center">
            <div class="flex items-center gap-6 lg:gap-10 text-lg lg:text-xl text-zinc-200 font-medium">
                <a href="/" class="hover:text-white transition-colors">Home</a>
                <a href="/About" class="hover:text-white transition-colors">About</a>
                <div class="flex-shrink-0 relative group">
                    <button class="hover:cursor-pointer">Category</button>
                    <div class="hidden group-hover:flex z-50 absolute top-full left-1/2 -translate-x-1/2 items-center flex-col bg-gray-700 shadow-xl py-1">
                        <div class="flex flex-col p-3">
                            <a class="px-4 py-2.5 text-base text-stone-200 hover:bg-gray-600 transition-colors" href="/Category/Men">Men</a>
                            <a class="px-4 py-2.5 text-base text-stone-200 hover:bg-gray-600 transition-colors" href="/Category/Women">Women</a>
                        </div>
                    </div>
                </div>
                <a href="/Contact/" class="hover:text-white transition-colors">Contact</a>
            </div>
        </div>

        <!-- Spacer on mobile -->
        <div class="flex-1 md:hidden"></div>

        <!-- Account -->
        <div class="flex-shrink-0 relative group">
            <div id="accimage" class="h-11 w-11 md:h-14 md:w-14 bg-zinc-800 rounded-full cursor-pointer flex items-center justify-center text-xl font-bold text-gray-700 overflow-hidden">
                <img id="accimg" src="" class="w-full h-full object-cover">
            </div>
            <div id="dropdownMenu" class="hidden group-hover:flex absolute top-full right-0 mt-0 flex-col bg-gray-700 border border-gray-600 rounded-md shadow-xl w-44 py-1 z-50"></div>
        </div>

        <!-- Mobile hamburger -->
        <button id="navToggle" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden flex-shrink-0 text-zinc-200 p-2" aria-label="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
            </svg>
        </button>
    </nav>

    <!-- Mobile menu panel -->
    <div id="mobileMenu" class="hidden md:hidden bg-gray-700 text-zinc-200 shadow-md">
        <div class="flex flex-col px-4 py-3 gap-1 text-base">
            <a href="/" class="py-2 hover:text-white border-b border-gray-600">Home</a>
            <a href="/About" class="py-2 hover:text-white border-b border-gray-600">About</a>
            <a href="/Category/Men" class="py-2 hover:text-white border-b border-gray-600">Men</a>
            <a href="/Category/Women" class="py-2 hover:text-white border-b border-gray-600">Women</a>
            <a href="/Contact/" class="py-2 hover:text-white">Contact</a>
        </div>
    </div>
</body>
</html>
